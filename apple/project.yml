# XcodeGen manifest — run `xcodegen` in this directory to produce ClaudeMicro.xcodeproj
name: ClaudeMicro
options:
  bundleIdPrefix: com.tomnguyen.claudemicro
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: S4XWNBC3N9   # Tom Nguyen (Personal Team)

targets:
  ClaudeMicro:
    type: application
    platform: iOS
    sources: [Shared, iOS]
    info:
      path: iOS/Info.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Connects to the Claude Micro companion server running on your Mac."
        NSCameraUsageDescription: "Scans the pairing QR code shown by the claude-micro server on your Mac."
        # ws:// to the Mac: Tailscale's 100.x CGNAT range is not "local" to ATS, so the
        # bridge needs NSAllowsArbitraryLoads — and it must stand ALONE: iOS ignores
        # ArbitraryLoads whenever a narrower NSAllows* key (e.g. LocalNetworking) is
        # also present. Acceptable: link is token-authenticated + Tailscale-encrypted.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - target: ClaudeMicroWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomnguyen.claudemicro.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ClaudeMicroWatch:
    type: application
    platform: watchOS
    sources: [Shared, WatchApp]
    entitlements:
      path: ClaudeMicroWatch.entitlements
      properties:
        com.apple.security.application-groups: [group.com.tomnguyen.claudemicro]
    info:
      path: WatchApp/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.tomnguyen.claudemicro.app
        WKRunsIndependentlyOfCompanionApp: false
    dependencies:
      - target: ClaudeMicroWatchWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomnguyen.claudemicro.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ClaudeMicroWatchWidget:
    type: app-extension
    platform: watchOS
    sources: [Shared/Models.swift, WatchWidget]
    entitlements:
      path: ClaudeMicroWatchWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.tomnguyen.claudemicro]
    info:
      path: WatchWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomnguyen.claudemicro.app.watchkitapp.widget
